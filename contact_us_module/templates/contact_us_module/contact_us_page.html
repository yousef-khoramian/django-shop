{% extends 'base.html' %}


{% block title %}
    تماس با ما
{% endblock %}


{% block body %}

    <div id="contact-page" class="container">
        <div class="bg">
            <div class="row">
                <div class="container">
                    <div class="col-sm-12" style="overflow: hidden; margin-bottom: 40px">
                        <h2 class="title text-center">تمـاس با مـا</h2>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-8">
                    <div class="contact-form">
                        <div class="status alert alert-success" style="display: none"></div>
                        <form id="form_contact_us" action="" method="post">
                            {% csrf_token %}
                            <div class="form-group col-md-12">
                                <textarea name="message" id="message" required class="form-control" rows="8"
                                          placeholder="پیغـام شمـا"></textarea>
                            </div>
                            <div class="form-group col-md-12">
                                <input type="submit" name="submit" class="btn btn-primary pull-right" value="ارسـال">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-sm-4">
	    			<div class="contact-info">
	    				<h2 class="title text-center">اطلاعات تماس</h2>
	    				<address>
							<p>تلفن تماس : {{ site_setting.phone_number }}</p>
							<p style="font-family: tahoma;">ایمیـل : {{ site_setting.email }}</p>
	    				</address>
	    			</div>
    			</div>
            </div>
        </div>
    </div><!--/#contact-page-->

{% endblock %}
